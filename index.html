<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Programa Inmortalidad · Acceso Restringido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>
  <div class="scanline"></div>

  <!-- PANTALLA 1: ACCESO -->
  <main id="pantalla-acceso" class="pantalla activa">

    <div class="ficha">

      <div class="ficha__header">
        <span class="eyebrow">GOBIERNO DE LA UNIDAD GLOBAL</span>
        <span class="ficha__linea"></span>
      </div>

      <div class="sello-wrap">
        <div class="sello-anillo"></div>
        <img src="logo.png" alt="Sello del Programa Inmortalidad" class="sello">
      </div>

      <h1 class="titulo">PROGRAMA<br>INMORTALIDAD</h1>
      <p class="subtitulo">Ciencia y Eternidad</p>

      <div class="separador">
        <span></span>
        <span class="separador__texto">TERMINAL DE VERIFICACIÓN · NIVEL RESTRINGIDO</span>
        <span></span>
      </div>

      <form id="form-acceso" class="formulario" autocomplete="off">
        <label for="usuario" class="etiqueta">INSERTE NOMBRE DE USUARIO</label>
        <div class="campo">
          <span class="campo__prompt">&gt;</span>
          <input
            type="text"
            id="usuario"
            name="usuario"
            class="campo__input"
            placeholder="CLAVE DE ACCESO"
            spellcheck="false"
            autocapitalize="off"
            autocorrect="off"
            autocomplete="off"
            required
          >
          <button type="button" id="boton-mostrar" class="campo__toggle" aria-label="Mostrar clave" aria-pressed="false">
            <svg class="icono-ojo" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path class="icono-ojo__abierto" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <circle class="icono-ojo__abierto" cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
              <path class="icono-ojo__cerrado" d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.24 4.24M7.4 7.6C4.6 9.2 3 12 3 12s4 7 11 7c1.6 0 3-.37 4.24-.96M16.7 16.7C19.2 15 21 12 21 12s-1.4-2.45-4.06-4.3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <button type="submit" class="boton">VALIDAR IDENTIDAD</button>

        <p id="mensaje-error" class="mensaje-error" aria-live="polite"></p>
      </form>

      <div class="ficha__footer">
        <span>EXP. N.° 0819-Ω</span>
        <span>CLASIFICACIÓN: ULTRA</span>
      </div>

    </div>

  </main>

  <!-- PANTALLA 2: RESULTADO -->
  <main id="pantalla-resultado" class="pantalla">
    <div class="resultado">
      <div class="resultado__stamp">ACCESO CONCEDIDO</div>
      <div class="resultado__marco">
        <img src="resultado.png" alt="Documento clasificado" class="resultado__imagen" id="imagen-resultado">
      </div>
      <button id="boton-volver" class="boton boton--fantasma">CERRAR SESIÓN</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
